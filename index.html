<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>ポケモン比較ツール</title>
    
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        gap: 40px;

        justify-content: flex-start;
      }

      #leftName {
        width: 50%;
      }

      #rightName {
        width: 50%;
      }
      
      .column {
        width: 100%;
        max-width: 400px;
      }
      
      .pokemon-block {
        border: 1px solid #ccc;
        padding: 10px;
        margin-bottom: 10px;
        width: 100%;
        box-sizing: border-box;
      }

      .team-controls {
        display: flex;
        flex-wrap: wrap; /* はみ出したら折り返し */
        gap: 6px;
        margin-bottom: 20px;
      }

      /* 左（青系） */
      #left input {
        background-color: #d8ecff; /* 淡い青 */
        color: #000;
        border: 1px solid #7fbfff;
      }
      
      /* 右（赤系） */
      #right input {
        background-color: #ffdede; /* 淡い赤 */
        color: #000;
        border: 1px solid #ff9a9a;
      }
      
      input {
        width: 80%;
        margin-bottom: 5px;
      }

      input::placeholder {
        color: #ccc;
      }

      .suggest {
        border: 1px solid #ccc;
        background: white;
        max-height: 150px;
        overflow-y: auto;
      }

      .suggest div {
        padding: 4px;
        cursor: pointer;
      }

      .suggest div:hover {
        background: #eee;
      }
      
      .data {
        font-size: 14px;
      }

      .data > div {
        margin-top: 6px;  /* 下と合わせる */
      }

      details > div {
        margin-top: 6px;  /* 上と合わせる */
      }

      .stat-row {
        display: flex;
      }
      
      .stat-box {
        width: 20%;
      }

      .weak-label {
        display: inline-block;
        width: 60px;
        text-align: right;
        margin-right: 6px;
      }

      .type {
        display: inline-block;
        text-align: center;
        padding: 2px 8px;
        margin-right: 4px;
        border-radius: 8px;
        min-width: 40px;
        color: white;
        font-weight: bold;
        font-size: 12px;
      }
      
      /* タイプごとの色 */
      .type-くさ { background: #78C850; }
      .type-どく { background: #A040A0; }
      .type-ほのお { background: #F08030; }
      .type-みず { background: #6890F0; }
      .type-でんき { background: #bfa000; }
      .type-こおり { background: #5ca8a8; }
      .type-かくとう { background: #C03028; }
      .type-じめん { background: #a88b3a; }
      .type-ひこう { background: #A890F0; }
      .type-エスパー { background: #F85888; }
      .type-むし { background: #A8B820; }
      .type-いわ { background: #B8A038; }
      .type-ゴースト { background: #705898; }
      .type-ドラゴン { background: #7038F8; }
      .type-あく { background: #705848; }
      .type-はがね { background: #7a7a9a; }
      .type-フェアリー { background: #EE99AC; }
      .type-ノーマル { background: #A8A878; }
    </style>
  </head>
  
  <body>
    
    <div class="column">
      <h3>左チーム</h3>
      
      <input id="leftName" placeholder="保存名">
      
      <div class="team-controls">
        <select id="leftSelect" onchange="loadTeam('left')"></select>
        <button onclick="saveTeam('left')">保存</button>
        <button onclick="deleteTeam('left')">削除</button>
      </div>
      
      <div id="left"></div>
    </div>
    
    <div class="column">
      <h3>右チーム</h3>
      
      <input id="rightName" placeholder="保存名">
      
      <div class="team-controls">
        <select id="rightSelect" onchange="loadTeam('right')"></select>
        <button onclick="saveTeam('right')">保存</button>
        <button onclick="deleteTeam('right')">削除</button>
      </div>
      
      <div id="right"></div>
    </div>
    
    <!-- 候補リスト -->
    <datalist id="pokemonList"></datalist>
    
    <script src="script.js"></script>
  </body>
</html>
