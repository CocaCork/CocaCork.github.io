<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>直接対決記録ツール</title>
<style>
body { font-family: sans-serif; padding: 20px; }
input, select, button { margin: 5px; }
table { border-collapse: collapse; margin-top: 15px; }
td, th { border: 1px solid #ccc; padding: 5px 10px; }
.win { background-color: #d0f0ff; }
</style>
</head>

<body>

<h2>🐎 馬の登録</h2>
<input type="text" id="horseName" placeholder="馬名">
<button onclick="addHorse()">追加</button>

<ul id="horseList"></ul>

<hr>

<h2>⚔️ 対戦結果入力</h2>

馬A：<select id="horseA"></select>
馬B：<select id="horseB"></select>

<br>

勝者：<select id="winner"></select>

<br><br>

レース名：<input type="text" id="raceName">
日付：<input type="date" id="raceDate">

<br>

距離：
<input type="number" id="distance" placeholder="例：1200">

馬場：
<select id="surface">
  <option value="芝">芝</option>
  <option value="ダート">ダート</option>
</select>

<br>

<button onclick="addMatch()">結果を追加</button>

<hr>

<h2>📊 対戦結果一覧</h2>
<table>
<thead>
<tr>
<th>日付</th>
<th>レース</th>
<th>距離</th>
<th>馬場</th>
<th>馬A</th>
<th>馬B</th>
<th>勝者</th>
</tr>
</thead>
<tbody id="resultTable"></tbody>
</table>

<script>
let horses = JSON.parse(localStorage.getItem("horses")) || [];
let matches = JSON.parse(localStorage.getItem("matches")) || [];

function save() {
  localStorage.setItem("horses", JSON.stringify(horses));
  localStorage.setItem("matches", JSON.stringify(matches));
}

function addHorse() {
  const name = document.getElementById("horseName").value.trim();
  if (!name) return;

  horses.push(name);
  document.getElementById("horseName").value = "";

  save();
  render();
}

function render() {
  // 馬リスト
  const list = document.getElementById("horseList");
  list.innerHTML = "";
  horses.forEach(h => {
    const li = document.createElement("li");
    li.textContent = h;
    list.appendChild(li);
  });

  // セレクト更新
  ["horseA", "horseB", "winner"].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = "";
    horses.forEach(h => {
      const opt = document.createElement("option");
      opt.value = h;
      opt.textContent = h;
      sel.appendChild(opt);
    });
  });

  // 結果表示
  const table = document.getElementById("resultTable");
  table.innerHTML = "";

  matches.forEach(m => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${m.date}</td>
      <td>${m.race}</td>
      <td>${m.distance}m</td>
      <td>${m.surface}</td>
      <td class="${m.winner === m.a ? 'win' : ''}">${m.a}</td>
      <td class="${m.winner === m.b ? 'win' : ''}">${m.b}</td>
      <td>${m.winner}</td>
    `;

    table.appendChild(tr);
  });
}

function addMatch() {
  const a = document.getElementById("horseA").value;
  const b = document.getElementById("horseB").value;
  const winner = document.getElementById("winner").value;
  const race = document.getElementById("raceName").value;
  const date = document.getElementById("raceDate").value;
  const distance = document.getElementById("distance").value;
  const surface = document.getElementById("surface").value;

  if (a === b) {
    alert("同じ馬は選べません");
    return;
  }

  matches.push({
    a, b, winner,
    race,
    date,
    distance,
    surface
  });

  save();
  render();
}

render();
</script>

</body>
</html>
