<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>競馬直対記録ツール</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    input, select, button { margin: 5px; }
    table { border-collapse: collapse; margin-top: 15px; }
    td, th {
      border: 1px solid #ccc;
      padding: 5px 10px;
      text-align: center;      /* 横中央 */
      vertical-align: middle;  /* 縦中央 */
    }
    .win { background-color: #d0f0ff; }

    .gap-right {
      margin-right: 50px;
    }
    
    .filter1 { color: red; font-weight: bold; }
    .filter2 { color: blue; font-weight: bold; }
    .filter3 { color: green; font-weight: bold; }

    .margin-time {
      border-right: none;
    }
    
    .margin-text {
      border-left: none;
      font-size: 0.85em;
    }
  </style>
</head>

<body>
  
  <h2>💾 データ保存・読込</h2>
  <input type="text" id="saveName" placeholder="保存名を入力">
  <button onclick="saveData()">保存</button>
  <select id="loadSelect" onchange="loadData()" class="gap-right"></select>
  <button onclick="deleteData()">削除</button>
  <button onclick="deleteAllData()" class="gap-right">全削除</button>
  <button onclick="exportJSON()">JSONダウンロード</button>
  <input type="file" id="fileInput" accept=".json" onchange="importJSON(event)">
  
  <hr>
  
  <h2>🐎 馬の登録</h2>
  <div style="display: flex; gap: 30px; align-items: flex-start;">
    <div>
      <input type="text" id="horseName" placeholder="馬名を入力">
      <button onclick="addHorse()">追加</button>
    </div>
    
    <details>
      <summary>登録済みの馬一覧（クリックで表示）</summary>
      <ul id="horseList"></ul>
    </details>
  </div>
  
  <hr>
  
  <h2>⚔️ 対戦結果入力</h2>
  勝者：<select id="winner"></select>
  順位：<select id="winnerRank"></select>
  
  敗者：<select id="loser"></select>
  順位：<select id="loserRank"></select>
  
  <br><br>
  
  タイム差：
  <input type="number" id="margin" step="0.1" min="0" value="0">
  
  <br><br>

  日付：<input type="date" id="raceDate">
  レース名：<input type="text" id="raceName" placeholder="レース名を入力">
  
  <br>

  開催：
  <input list="courseList" id="course" placeholder="競馬場を入力">
  <datalist id="courseList">
    <option value="札幌">
    <option value="函館">
    <option value="福島">
    <option value="新潟">
    <option value="中山">
    <option value="東京">
    <option value="中京">
    <option value="京都">
    <option value="阪神">
    <option value="小倉">
  </datalist>

  馬場：
  <select id="surface">
    <option value="芝">芝</option>
    <option value="ダート">ダート</option>
  </select>
  
  距離：
  <select id="distance"></select>
  
  <br>
  
  <button onclick="addMatch()">結果を追加</button>
  
  <hr>
  
  <h2>🔍 フィルター</h2>
  対象馬①：
  <select id="filterHorse1" onchange="render()">
    <option value="">すべて表示</option>
  </select>
  
  対象馬②：
  <select id="filterHorse2" onchange="render()">
    <option value="">すべて表示</option>
  </select>
  
  対象馬③：
  <select id="filterHorse3" onchange="render()" class="gap-right">
    <option value="">すべて表示</option>
  </select>

  <button onclick="clearFilters()">フィルター解除</button>
  
  <hr>
  
  <h2>📊 対戦結果一覧</h2>
  <table>
    <thead>
      <tr>
        <th>評価</th>
        <th>日付</th>
        <th>レース</th>
        <th>開催</th>
        <th>馬場</th>
        <th>距離</th>
        <th>勝者</th>
        <th>敗者</th>
        <th colspan="2">着差</th>
        <th>削除</th>
      </tr>
    </thead>
    <tbody id="resultTable"></tbody>
  </table>
  
<script>
  let isDirty = false;
  
  let horses = [];
  let matches = [];
  
  let allData = JSON.parse(localStorage.getItem("allData")) || {};
  
  function addHorse() {
    const name = document.getElementById("horseName").value.trim();
    if (!name) return;
    
    // 重複チェック
    if (horses.includes(name)) {
      alert("同じ馬名が既に登録されています");
      return;
    }
    
    horses.push(name);
    document.getElementById("horseName").value = "";
    
    isDirty = true;
    
    render();
  }
  
  function deleteHorse(index) {
    if (!confirm("この馬を削除しますか？")) return;
    
    const horseName = horses[index];
    
    // 対戦データも削除（この馬が含まれるもの）
    matches = matches.filter(m => m.winner !== horseName && m.loser !== horseName);
    
    horses.splice(index, 1);
    
    isDirty = true;
    
    render();
  }
  
  function editHorse(index) {
    const oldName = horses[index];
    
    const newName = prompt("新しい馬名を入力してください", oldName);
    if (!newName || newName.trim() === "") return;
    
    const trimmedName = newName.trim();
    
    // 同名チェック（重複防止）
    if (horses.includes(trimmedName)) {
      alert("同じ馬名が既に存在します");
      return;
    }
    
    // horses配列を更新
    horses[index] = trimmedName;
    
    // matches内のデータも更新
    matches.forEach(m => {
      if (m.winner === oldName) m.winner = trimmedName;
      if (m.loser === oldName) m.loser = trimmedName;
    });
    
    isDirty = true;
    
    render();
  }

  function initRankSelect(id) {
    const sel = document.getElementById(id);
    
    // 念のため初期化（重複防止）
    sel.innerHTML = "";
    
    for (let i = 1; i <= 18; i++) {
      const opt = document.createElement("option");
      opt.value = i;
      opt.textContent = i;
      sel.appendChild(opt);
    }
  }
  
  function render() {
    // 馬リスト
    const list = document.getElementById("horseList");
    list.innerHTML = "";
    horses.forEach((h, i) => {
      const li = document.createElement("li");
      
      li.innerHTML = `
      ${h}
      <button onclick="editHorse(${i})">変更</button>
      <button onclick="deleteHorse(${i})">削除</button>
      `;
      
      list.appendChild(li);
    });
    
    // セレクト更新
    ["winner", "loser", "filterHorse1", "filterHorse2", "filterHorse3"].forEach(id => {
      const sel = document.getElementById(id);
      const current = sel.value;
      sel.innerHTML = "";
      
      if (id === "filterHorse1" || id === "filterHorse2" || id === "filterHorse3") {
        const allOpt = document.createElement("option");
        allOpt.value = "";
        allOpt.textContent = "すべて表示";
        sel.appendChild(allOpt);
      }
      
      horses.forEach(h => {
        const opt = document.createElement("option");
        opt.value = h;
        opt.textContent = h;
        sel.appendChild(opt);
      });
      
      sel.value = current || "";
    });
    
    // 距離プルダウン
    const distSel = document.getElementById("distance");
    
    if (distSel.children.length === 0) {
      for (let d = 1000; d <= 3600; d += 100) {
        const opt = document.createElement("option");
        opt.value = d;
        opt.textContent = d + "m";
        distSel.appendChild(opt);
      }
    }
    
    // フィルター値
    const f1 = document.getElementById("filterHorse1").value;
    const f2 = document.getElementById("filterHorse2").value;
    const f3 = document.getElementById("filterHorse3").value;
    
    // ソート
    const sortedMatches = [...matches].sort((a, b) => {
      // 日付（新しい順）
      const dateDiff = new Date(b.date) - new Date(a.date);
      if (dateDiff !== 0) return dateDiff;
      
      // 勝者（昇順）
      const winnerDiff = a.winner.localeCompare(b.winner, 'ja');
      if (winnerDiff !== 0) return winnerDiff;
      
      // 敗者（昇順）
      return a.loser.localeCompare(b.loser, 'ja');
    });
    
    // 結果表示
    const table = document.getElementById("resultTable");
    table.innerHTML = "";
    
    sortedMatches.forEach((m) => {
      // フィルター適用
      const filters = [f1, f2, f3].filter(f => f);
      
      if (filters.length > 0) {
        const hit = filters.some(f => m.winner === f || m.loser === f);
        if (!hit) return;
      }
      
      const originalIndex = matches.indexOf(m);
      
      const tr = document.createElement("tr");
      
      function getClass(name) {
        if (name === f1) return "filter1";
        if (name === f2) return "filter2";
        if (name === f3) return "filter3";
        return "";
      }
      
      const winnerClass = getClass(m.winner);
      const loserClass = getClass(m.loser);
      
      const marginData = formatMargin(m.margin);
      
      tr.innerHTML = `
      <td>
      <select onchange="updateMark(${originalIndex}, this.value)">
      <option value="">-</option>
      <option value="○" ${m.mark === "○" ? "selected" : ""}>○</option>
      <option value="△" ${m.mark === "△" ? "selected" : ""}>△</option>
      <option value="×" ${m.mark === "×" ? "selected" : ""}>×</option>
      <option value="✓" ${m.mark === "✓" ? "selected" : ""}>✓</option>
      </select>
      </td>
      
      <td>${m.date}</td>
      
      <td>
      <a href="https://www.google.com/search?q=${encodeURIComponent(m.date + '　' + m.race)}" target="_blank">
      ${m.race}
      </a>
      </td>
      
      <td>${m.course || ""}</td>
      <td>${m.surface}</td>
      <td>${m.distance}m</td>
      
      <td class="win ${winnerClass}">
      ${m.winner}${m.winnerRank ? ` (${m.winnerRank})` : ""}
      </td>
      
      <td class="${loserClass}">
      ${m.loser}${m.loserRank ? ` (${m.loserRank})` : ""}
      </td>
      
      <td class="margin-time">${marginData.time}</td>
      <td class="margin-text">${marginData.margin}</td>
      
      <td><button onclick="deleteMatch(${originalIndex})">削除</button></td>
      `;
      
      table.appendChild(tr);
    });
  }
  
  function formatMargin(time) {
    const t = parseFloat(time);
    if (isNaN(t)) return { time: "", margin: "" };
    
    const map = {
      0.0: "0",
      0.1: "1/2馬身",
      0.2: "1馬身",
      0.3: "1 3/4馬身",
      0.4: "2 1/2馬身",
      0.5: "3馬身",
      0.6: "3 1/2馬身",
      0.7: "4馬身",
      0.8: "5馬身",
      0.9: "5馬身",
      1.0: "6馬身",
      1.1: "7馬身",
      1.2: "7馬身",
      1.3: "8馬身",
      1.4: "9馬身",
      1.5: "9馬身",
      1.6: "10馬身"
    };
    
    const rounded = Math.round(t * 10) / 10;
    const displayTime = rounded.toFixed(1);
    
    if (rounded >= 1.7) {
      return { time: displayTime, margin: "大差" };
    }
    
    if (map.hasOwnProperty(rounded)) {
      if (rounded === 0) return { time: "0", margin: "" };
      return { time: displayTime, margin: map[rounded] };
    }
    return { time: displayTime, margin: "" };
  }

  function clearFilters() {
    ["filterHorse1", "filterHorse2", "filterHorse3"].forEach(id => {
      document.getElementById(id).value = "";
    });
    render();
  }
  
  function addMatch() {
    const winner = document.getElementById("winner").value;
    const loser = document.getElementById("loser").value;
    const winnerRank = document.getElementById("winnerRank").value;
    const loserRank = document.getElementById("loserRank").value;
    const margin = document.getElementById("margin").value;
    const race = document.getElementById("raceName").value;
    const date = document.getElementById("raceDate").value;
    const course = document.getElementById("course").value;
    const surface = document.getElementById("surface").value;
    const distance = document.getElementById("distance").value;
    
    if (winner === loser) {
      alert("同じ馬は選べません");
      return;
    }

    // 重複チェック（日付・勝者・敗者が完全一致）
    const exists = matches.some(m =>
      m.date === date &&
      m.winner === winner &&
      m.loser === loser
                               );
    
    if (exists) {
      alert("同じ日付・勝者・敗者のデータは既に存在します");
      return;
    }
    
    matches.push({
      winner,
      loser,
      winnerRank,
      loserRank,
      margin,
      race,
      date,
      course,
      surface,
      distance,
      mark: ""
    });
    
    isDirty = true;
    render();
    alert("データを追加しました");
  }

  function deleteMatch(index) {
    if (!confirm("削除しますか？")) return;
    
    matches.splice(index, 1);
  
    isDirty = true;
    
    render();
  }
  
  // 保存関数
  function saveData() {
    const name = document.getElementById("saveName").value.trim();
    if (!name) {
      alert("保存名を入力してください");
      return;
    }
    
    allData[name] = {
      horses: [...horses],
      matches: [...matches]
    };
    
    localStorage.setItem("allData", JSON.stringify(allData));
    
    isDirty = false;
    
    updateSaveList(name);
    
    alert("保存しました");
  }
  
  // 読込関数
  function loadData() {
    const sel = document.getElementById("loadSelect");
    const name = sel.value;
    if (!name) return;
    
    if (isDirty) {
      const ok = confirm("現在の変更内容は保存されません。読み込みますか？");
      if (!ok) {
        // 元の選択に戻す
        sel.value = document.getElementById("saveName").value || "";
        return;
      }
    }
    
    const data = allData[name];
    if (!data) return;
    
    horses = data.horses || [];
    matches = data.matches || [];
    
    isDirty = false;
    
    document.getElementById("saveName").value = name;
    
    updateSaveList(name);
    render();
  }
  
  // 削除関数
  function deleteData() {
    const name = document.getElementById("loadSelect").value;
    if (!name) return;
    
    if (!confirm("削除しますか？")) return;
    
    delete allData[name];
    localStorage.setItem("allData", JSON.stringify(allData));
    
    updateSaveList();
  }
  
  function deleteAllData() {
    if (!confirm("すべての保存データと現在のデータを削除しますか？")) return;
    
    // 保存データ削除
    allData = {};
    localStorage.removeItem("allData");
    
    // UI更新
    updateSaveList();
    
    alert("保存データをすべて削除しました");
  }

  function updateMark(index, value) {
    matches[index].mark = value;
    isDirty = true;
  }
  
  // プルダウン更新
  function updateSaveList(selectedName = "") {
    const sel = document.getElementById("loadSelect");
    sel.innerHTML = "";
    
    // 未選択用
    const defaultOpt = document.createElement("option");
    defaultOpt.value = "";
    defaultOpt.textContent = "データを選択";
    defaultOpt.disabled = true;
    defaultOpt.selected = true;
    sel.appendChild(defaultOpt);
    
    Object.keys(allData).forEach(name => {
      const opt = document.createElement("option");
      opt.value = name;
      opt.textContent = name;
      
      if (name === selectedName) {
        opt.selected = true;
        defaultOpt.selected = false;
      }
      
      sel.appendChild(opt);
    });
  }
  
  function exportJSON() {
    const data = {
      name: document.getElementById("saveName").value,
      horses: horses,
      matches: matches
    };
    
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    
    const url = URL.createObjectURL(blob);
    
    const a = document.createElement("a");
    a.href = url;
    
    // ファイル名（保存名があればそれを使う）
    const name = document.getElementById("saveName").value || "keiba_data";
    a.download = name + ".json";
    
    a.click();
    
    URL.revokeObjectURL(url);
  }
  
  function importJSON(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    
    reader.onload = function(e) {
      
      try {
        const data = JSON.parse(e.target.result);
        
        if (!data.horses || !data.matches) {
          alert("形式が正しくありません");
          return;
        }
        
        if (isDirty) {
          const ok = confirm("現在のデータは上書きされます。よろしいですか？");
          if (!ok) return;
        }
        
        horses = data.horses;
        matches = data.matches;

        if (data.name) {
          document.getElementById("saveName").value = data.name;
        }
        
        isDirty = false;
        
        render();
        alert("読み込み完了しました");
      
      } catch (err) {
        alert("読み込みに失敗しました");
      }
    };
    
    reader.readAsText(file);
  }
  
  initRankSelect("winnerRank");
  initRankSelect("loserRank");
  
  updateSaveList();
  render();
  
  // ページ離脱時の警告
  window.addEventListener("beforeunload", function (e) {
    if (!isDirty) return;
    
    e.preventDefault();
    e.returnValue = "";
  });
</script>

</body>
</html>
